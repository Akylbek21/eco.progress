map $http_x_forwarded_proto $redirect_to_https {
    default 0;
    http 1;
}

server {
    listen 80;
    server_name www.ecoprogress.kz;
    return 301 https://ecoprogress.kz$request_uri;
}

server {
    listen 80 default_server;
    server_name ecoprogress.kz _;
    root /usr/share/nginx/html;
    index index.html;

    if ($redirect_to_https) {
        return 301 https://ecoprogress.kz$request_uri;
    }

    location ~ ^(.+)/+$ {
        return 301 https://ecoprogress.kz$1$is_args$args;
    }

    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend "${BACKEND_URL}";
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        client_max_body_size 20m;
    }

    location ~ ^/(cabinet|staff|admin|dashboard)(/|$) {
        try_files $uri $uri/index.html /index.html;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    location ~ ^/(login|register|reset-password)$ {
        try_files $uri $uri/index.html /index.html;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    location / {
        try_files $uri $uri/index.html =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
        add_header X-Robots-Tag "noindex, follow" always;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|webp|avif|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
}
