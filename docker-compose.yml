services:
  frontend:
    build: .
    container_name: eco-frontend
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:80"
    environment:
      - BACKEND_URL=${BACKEND_URL:-http://eco-app:8080}
    restart: unless-stopped
    networks:
      - eco

networks:
  eco:
    external: true
    name: eco-net
