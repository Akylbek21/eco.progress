# ──────────────────────────────────────────────────────────────
# db.ecoprogress.kz  —  phpMyAdmin для EcoProgress
# ──────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name db.ecoprogress.kz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name db.ecoprogress.kz;

    ssl_certificate     /etc/letsencrypt/live/db.ecoprogress.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/db.ecoprogress.kz/privkey.pem;
    include /etc/nginx/snippets/ssl-params.conf;

    location / {
        proxy_pass http://127.0.0.1:8083;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    client_max_body_size 64m;

    access_log /var/log/nginx/db.ecoprogress.access.log;
    error_log  /var/log/nginx/db.ecoprogress.error.log;
}
