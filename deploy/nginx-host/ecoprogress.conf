# ──────────────────────────────────────────────────────────────
# ecoprogress.kz  —  EcoProgress Group
# Host-level Nginx virtual host (reverse proxy → Docker)
# ──────────────────────────────────────────────────────────────
# Фронтенд:  127.0.0.1:3000  (eco-frontend контейнер)
# Бэкенд:    проксируется внутри фронтенд-контейнера через /api/
# ──────────────────────────────────────────────────────────────

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name ecoprogress.kz www.ecoprogress.kz;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ecoprogress.kz www.ecoprogress.kz;

    # --- SSL (Let's Encrypt) ---
    ssl_certificate     /etc/letsencrypt/live/ecoprogress.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ecoprogress.kz/privkey.pem;
    include /etc/nginx/snippets/ssl-params.conf;

    # --- API: proxy directly to backend (bypass frontend nginx) ---
    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        client_max_body_size  20m;
    }

    # --- Frontend SPA ---
    location / {
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # --- Увеличенный лимит для загрузки файлов ---
    client_max_body_size 20m;

    # --- Логи ---
    access_log /var/log/nginx/ecoprogress.access.log;
    error_log  /var/log/nginx/ecoprogress.error.log;
}
